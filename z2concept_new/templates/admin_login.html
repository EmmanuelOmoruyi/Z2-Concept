<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login – Z2 Concept</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600&family=Barlow+Condensed:wght@700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --orange: #E87722; --black: #0A0A0A; --white: #F5F5F0;
      --font-display: 'Bebas Neue', sans-serif;
      --font-cond: 'Barlow Condensed', sans-serif;
      --font-body: 'Barlow', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--black);
      color: var(--white);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-box {
      width: 100%;
      max-width: 420px;
      border: 1px solid rgba(232,119,34,0.2);
      padding: 48px 40px;
      background: #111;
    }
    .login-logo {
      font-family: var(--font-display);
      font-size: 2.4rem;
      color: var(--orange);
      margin-bottom: 4px;
    }
    .login-sub {
      font-family: var(--font-cond);
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      color: rgba(245,245,240,0.35);
      margin-bottom: 36px;
    }
    label {
      display: block;
      font-family: var(--font-cond);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: var(--orange);
      margin-bottom: 8px;
      margin-top: 20px;
    }
    input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(232,119,34,0.25);
      color: var(--white);
      font-family: var(--font-body);
      font-size: 1rem;
      padding: 13px 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--orange); }
    .error {
      background: rgba(200,40,40,0.12);
      border: 1px solid rgba(200,40,40,0.4);
      color: #ff8080;
      font-size: 0.85rem;
      padding: 12px 16px;
      margin-top: 20px;
    }
    button {
      margin-top: 28px;
      width: 100%;
      font-family: var(--font-display);
      font-size: 1.3rem;
      letter-spacing: 0.08em;
      color: var(--black);
      background: var(--orange);
      border: none;
      padding: 16px;
      cursor: pointer;
      clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
      transition: background 0.2s;
    }
    button:hover { background: #FF9A45; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">Z2 CONCEPT</div>
    <div class="login-sub">ADMIN DASHBOARD · KEFEE HOME PRODUCTIONS</div>
    <form method="POST">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" required />
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required />
      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}
      <button type="submit">SIGN IN</button>
    </form>
  </div>
</body>
</html>
