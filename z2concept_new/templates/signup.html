<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up – Z2 Concept</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600&family=Barlow+Condensed:wght@700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --orange: #E87722; --orange-light: #FF9A45;
      --black: #0A0A0A; --black-2: #111;
      --white: #F5F5F0;
      --font-display: 'Bebas Neue', sans-serif;
      --font-cond: 'Barlow Condensed', sans-serif;
      --font-body: 'Barlow', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--black);
      color: var(--white);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .nav {
      padding: 0 40px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(232,119,34,0.15);
      background: var(--black-2);
    }
    .nav__logo { font-family: var(--font-display); font-size: 1.8rem; color: var(--orange); text-decoration: none; }
    .nav__back { font-family: var(--font-cond); font-size: 0.8rem; letter-spacing: 0.12em; color: rgba(245,245,240,0.4); text-decoration: none; transition: color 0.2s; }
    .nav__back:hover { color: var(--orange); }

    .page { flex: 1; display: flex; align-items: center; justify-content: center; padding: 48px 24px; }
    .card {
      width: 100%;
      max-width: 480px;
      background: var(--black-2);
      border: 1px solid rgba(232,119,34,0.18);
      padding: 48px 40px;
    }
    .card__eyebrow {
      font-family: var(--font-cond);
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      color: var(--orange);
      margin-bottom: 8px;
    }
    .card__title {
      font-family: var(--font-display);
      font-size: 3rem;
      color: var(--white);
      line-height: 1;
      margin-bottom: 32px;
    }
    .form-group { margin-bottom: 20px; }
    label {
      display: block;
      font-family: var(--font-cond);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: var(--orange);
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(232,119,34,0.22);
      color: var(--white);
      font-family: var(--font-body);
      font-size: 0.95rem;
      padding: 13px 16px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    input:focus { border-color: var(--orange); background: rgba(232,119,34,0.05); }
    input::placeholder { color: rgba(245,245,240,0.22); }
    .hint { font-size: 0.75rem; color: rgba(245,245,240,0.3); margin-top: 6px; }

    .errors {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.35);
      color: #f87171;
      font-size: 0.86rem;
      padding: 14px 16px;
      margin-bottom: 20px;
      line-height: 1.7;
    }
    .btn {
      width: 100%;
      font-family: var(--font-display);
      font-size: 1.4rem;
      letter-spacing: 0.06em;
      color: var(--black);
      background: var(--orange);
      border: none;
      padding: 16px;
      cursor: pointer;
      clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
      transition: background 0.2s;
      margin-top: 8px;
    }
    .btn:hover { background: var(--orange-light); }
    .card__footer {
      margin-top: 24px;
      text-align: center;
      font-size: 0.86rem;
      color: rgba(245,245,240,0.4);
    }
    .card__footer a { color: var(--orange); text-decoration: none; }
    .card__footer a:hover { color: var(--orange-light); }

    /* Strength indicator */
    .pw-strength { height: 3px; margin-top: 8px; background: rgba(255,255,255,0.08); position: relative; }
    .pw-strength__bar { height: 100%; width: 0%; transition: width 0.3s, background 0.3s; }
  </style>
</head>
<body>
  <nav class="nav">
    <a class="nav__logo" href="/">Z2</a>
    <a class="nav__back" href="/">← Back to site</a>
  </nav>

  <div class="page">
    <div class="card">
      <p class="card__eyebrow">CREATE ACCOUNT</p>
      <h1 class="card__title">SIGN UP</h1>

      {% if errors %}
        <div class="errors">
          {% for e in errors %}{{ e }}<br/>{% endfor %}
        </div>
      {% endif %}

      <form method="POST">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" value="{{ name }}" placeholder="Your full name" required autocomplete="name" />
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" value="{{ email }}" placeholder="you@example.com" required autocomplete="email" />
          <p class="hint">We'll send a verification link to this email.</p>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="At least 6 characters" required autocomplete="new-password" oninput="checkStrength(this.value)" />
          <div class="pw-strength"><div class="pw-strength__bar" id="pwBar"></div></div>
        </div>
        <div class="form-group">
          <label for="confirm_password">Confirm Password</label>
          <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat your password" required autocomplete="new-password" />
        </div>
        <button class="btn" type="submit">CREATE ACCOUNT</button>
      </form>

      <div class="card__footer">
        Already have an account? <a href="/login">Log in</a>
      </div>
    </div>
  </div>

  <script>
    function checkStrength(val) {
      const bar = document.getElementById('pwBar');
      let score = 0;
      if (val.length >= 6)  score++;
      if (val.length >= 10) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const colors = ['#ef4444','#f59e0b','#f59e0b','#22c55e','#22c55e'];
      bar.style.width  = (score * 20) + '%';
      bar.style.background = colors[score - 1] || '#ef4444';
    }
  </script>
</body>
</html>
